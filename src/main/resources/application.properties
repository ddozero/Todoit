# 1. 서버 포트 설정
server.port=8081

# 2. MySQL 연결 설정 (DB명: TODOIT)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/TODOIT?serverTimezone=Asia/Seoul&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234 

# 3. MyBatis 설정 
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.todoit.vo

# 4. 로그 설정
logging.level.com.todoit.mapper=debug